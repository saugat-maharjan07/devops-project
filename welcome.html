<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #007bff, #00c6ff);
    }

    .container {
      display: flex;
      width: 850px;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .welcome-section {
      flex: 1;
      background: #007bff;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
    }

    .welcome-section h1 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .welcome-section p {
      font-size: 16px;
      line-height: 1.6;
    }

    .login-section {
      flex: 1;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-section h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    .extra-text {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    .extra-text a {
      color: #007bff;
      text-decoration: none;
    }

    .extra-text a:hover {
      text-decoration: underline;
    }

    @media(max-width: 768px) {
      .container {
        flex-direction: column;
        width: 90%;
      }

      .welcome-section,
      .login-section {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Welcome Side -->
    <div class="welcome-section">
      <h1>Welcome Back!</h1>
      <p>
        Login to continue accessing your dashboard,
        manage your account, and explore amazing features.
      </p>
    </div>

    <!-- Login Side -->
    <div class="login-section">
      <h2>Login</h2>

      <form>
        <input type="text" placeholder="Username" required />
        <input type="password" placeholder="Password" required />

        <button type="submit">Login</button>
      </form>

      <div class="extra-text">
        Don't have an account?
        <a href="#">Sign Up</a>
      </div>
    </div>

  </div>

</body>
</html>
